# Example Horcrux configuration for CometBFT v1.0 protocol support
# This configuration demonstrates how to enable CometBFT v1.0 protocol compatibility

# Signing mode - can be "single" or "threshold"
signMode: single

# Protocol version - REQUIRED for CometBFT v1.0 support
# Options: "legacy" (default, for v0.38 and earlier) or "v1" (for v1.0+)
protocolVersion: v1

# Chain nodes configuration
chainNodes:
  - privValAddr: tcp://127.0.0.1:26658  # CometBFT node's privval listen address

# Optional: Debug address for metrics and debugging
debugAddr: 127.0.0.1:6001

# Optional: GRPC address for remote signing
grpcAddr: 127.0.0.1:5555

# Optional: Maximum read size for incoming messages (default: 1MB)
maxReadSize: 1048576

# For threshold mode configuration, add:
# thresholdMode:
#   threshold: 2
#   cosigners:
#     - shardID: 1
#       p2pAddr: tcp://127.0.0.1:2222
#     - shardID: 2
#       p2pAddr: tcp://127.0.0.1:2223
#     - shardID: 3
#       p2pAddr: tcp://127.0.0.1:2224
#   grpcTimeout: 1000ms
#   raftTimeout: 1000ms