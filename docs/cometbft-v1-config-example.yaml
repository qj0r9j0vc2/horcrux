# Example Horcrux configuration for CometBFT v1.0 protocol support
# This configuration demonstrates how to enable CometBFT v1.0 protocol compatibility

# Signing mode - can be "single" or "threshold"
signMode: single

# Chain nodes configuration
# Each node can have its own protocol version, allowing a single Horcrux instance
# to support multiple chains with different CometBFT versions
chainNodes:
  # Example 1: Chain with CometBFT v1.0 (e.g., Injective v1.16.0+)
  - privValAddr: tcp://injective-node:26658
    # Protocol version for this specific node
    # REQUIRED for CometBFT v1.0+ nodes
    protocolVersion: v1
    
  # Example 2: Chain with CometBFT v0.38 (e.g., Cosmoshub-4)
  - privValAddr: tcp://cosmoshub-node:26658
    # protocolVersion: legacy  # Optional, defaults to "legacy" for backward compatibility
    
  # Example 3: Another CometBFT v1.0 chain
  - privValAddr: tcp://another-v1-chain:26658
    protocolVersion: v1

# Optional: Debug address for metrics and debugging
debugAddr: 127.0.0.1:6001

# Optional: GRPC address for remote signing
grpcAddr: 127.0.0.1:5555

# Optional: Maximum read size for incoming messages (default: 1MB)
maxReadSize: 1048576

# For threshold mode configuration, add:
# thresholdMode:
#   threshold: 2
#   cosigners:
#     - shardID: 1
#       p2pAddr: tcp://127.0.0.1:2222
#     - shardID: 2
#       p2pAddr: tcp://127.0.0.1:2223
#     - shardID: 3
#       p2pAddr: tcp://127.0.0.1:2224
#   grpcTimeout: 1000ms
#   raftTimeout: 1000ms